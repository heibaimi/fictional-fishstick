<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日份开心请查收</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700&display=swap');

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .font-cute {
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        /* 星光闪烁背景 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: var(--opacity);
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(1); opacity: var(--opacity); }
            50% { transform: scale(1.5); opacity: 1; }
        }

        /* 卡片悬浮效果 */
        .magic-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .magic-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* 按钮点击波纹 */
        .btn-ripple {
            position: relative;
            overflow: hidden;
        }
        .btn-ripple::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease-out, height 0.6s ease-out;
        }
        .btn-ripple:active::after {
            width: 300px;
            height: 300px;
        }

        /* 文字浮现动画 */
        .fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 relative">

    <!-- 背景星光容器 -->
    <div id="star-container" class="fixed inset-0 pointer-events-none z-0"></div>

    <!-- 主内容区 -->
    <main class="w-full max-w-md z-10">
        
        <!-- 头部问候 -->
        <header class="text-center mb-8">
            <div class="inline-block bg-white/30 backdrop-blur-sm rounded-full px-4 py-1 mb-4">
                <span class="text-blue-600 font-bold text-sm"><i class="fas fa-star mr-1"></i> 专属能量站</span>
            </div>
            <h1 class="text-4xl font-cute text-white drop-shadow-md mb-2">Hi, 小仙女</h1>
            <p class="text-blue-100 text-lg">今天也是闪闪发光的一天呀</p>
        </header>

        <!-- 核心互动卡片 -->
        <div class="magic-card rounded-3xl p-8 shadow-xl mb-6 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 to-purple-400"></div>
            
            <div class="mb-6">
                <i class="fas fa-quote-left text-4xl text-blue-200 mb-4 block"></i>
                <div id="compliment-box" class="min-h-[120px] flex items-center justify-center">
                    <p class="text-xl text-gray-700 font-medium leading-relaxed">
                        点击下方按钮<br>领取今日份的超级好运
                    </p>
                </div>
                <i class="fas fa-quote-right text-4xl text-blue-200 mt-4 block"></i>
            </div>

            <button onclick="generateMagic()" class="btn-ripple w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:shadow-xl transition transform active:scale-95 flex items-center justify-center gap-2">
                <i class="fas fa-magic"></i> 施展开心魔法
            </button>
        </div>

        <!-- 辅助功能：心情切换 -->
        <div class="grid grid-cols-2 gap-4">
            <div onclick="changeMood('happy')" class="magic-card bg-white/80 p-4 rounded-2xl cursor-pointer text-center hover:bg-white">
                <div class="text-3xl mb-2">😆</div>
                <div class="text-sm font-bold text-gray-600">加倍快乐</div>
            </div>
            <div onclick="changeMood('calm')" class="magic-card bg-white/80 p-4 rounded-2xl cursor-pointer text-center hover:bg-white">
                <div class="text-3xl mb-2">😌</div>
                <div class="text-sm font-bold text-gray-600">平静安心</div>
            </div>
        </div>

    </main>

    <footer class="mt-8 text-center text-blue-200 text-xs z-10">
        <p>Powered by Unlimited Love</p>
    </footer>

    <script>
        // --- 数据配置 ---
        const compliments = [
            "你今天的发型/穿搭真的很有品味，走在路上回头率一定很高！",
            "不管发生什么，你在我心里永远是那个最聪明、最善良的小可爱。",
            "世界一般，但你超值。你的存在本身就是一种美好。",
            "别太累啦，你已经做得很好了，值得所有的好运和温柔。",
            "你的笑容有治愈能力，看一眼就能让人忘记烦恼。",
            "你不是普通的女孩，你是落入凡间的精灵，带着光来的。",
            "今天也要记得爱自己，因为你值得这世间所有的偏爱。",
            "如果快乐有等级，那你一定是SSR级别的稀有存在。",
            "不要怀疑自己，你比你自己想象的要强大、要优秀得多。",
            "遇见你，是我这辈子抽到的最好的上上签。"
        ];

        const happyExtras = ["🎉 快乐加倍！", "🌈 心情变晴朗！", "🍬 甜度满分！"];
        const calmExtras = ["🍃 微风拂面", "☕ 岁月静好", "🧘‍♀️ 内心宁静"];

        // --- 初始化背景星光 ---
        function initStars() {
            const container = document.getElementById('star-container');
            const starCount = 50;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
                star.style.setProperty('--opacity', `${Math.random() * 0.5 + 0.3}`);
                
                container.appendChild(star);
            }
        }

        // --- 核心功能：生成夸夸 ---
        function generateMagic() {
            const box = document.getElementById('compliment-box');
            const btn = document.querySelector('.btn-ripple');
            
            // 按钮反馈
            btn.classList.add('scale-95');
            setTimeout(() => btn.classList.remove('scale-95'), 100);

            // 随机选择文案
            const text = compliments[Math.floor(Math.random() * compliments.length)];
            
            // 动画切换
            box.innerHTML = `<p class="text-xl text-indigo-600 font-bold fade-in-up">${text}</p>`;
            
            // 触发小型彩带（可选，这里用简单的背景闪烁代替）
            document.body.style.background = `linear-gradient(${Math.random()*360}deg, #a1c4fd 0%, #c2e9fb 100%)`;
        }

        // --- 心情切换 ---
        function changeMood(type) {
            const box = document.getElementById('compliment-box');
            let extra = "";
            
            if (type === 'happy') {
                extra = happyExtras[Math.floor(Math.random() * happyExtras.length)];
                document.body.style.background = "linear-gradient(120deg, #f6d365 0%, #fda085 100%)";
            } else {
                extra = calmExtras[Math.floor(Math.random() * calmExtras.length)];
                document.body.style.background = "linear-gradient(120deg, #84fab0 0%, #8fd3f4 100%)";
            }
            
            box.innerHTML = `<p class="text-lg text-gray-600 fade-in-up">${extra}<br><span class="text-sm text-gray-400 mt-2 block">换个背景，换种心情</span></p>`;
        }

        // 启动
        document.addEventListener('DOMContentLoaded', initStars);
    </script>
</body>
</html>
